<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 15px; }
        .header-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 2px solid #2c3e50; }
        #recent-numbers { font-weight: bold; color: #d35400; font-size: 1.4rem; min-height: 1.5em; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-width: 380px; margin: auto; }
        .cell { aspect-ratio: 1; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 8px; border: 1px solid #ccc; font-size: 1.2rem; }
        .cell.marked { background: #f1c40f; border-color: #f39c12; }
        .cell.free { background: #27ae60; color: white; font-size: 0.8rem; }
        .win-btn { width: 100%; max-width: 380px; padding: 18px; margin-top: 20px; background: #c0392b; color: white; border: none; border-radius: 50px; font-size: 1.6rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-box">
        <div style="font-size: 0.9rem; color: #7f8c8d;">RECENT NUMBERS</div>
        <div id="recent-numbers">Connecting...</div>
    </div>

    <div class="bingo-board" id="board"></div>
    <button class="win-btn" onclick="claimBingo()">BINGO! 🏆</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // CRITICAL: Must be HTTPS
        const API_URL = "https://tbingo-game-4.onrender.com"; 

        async function updateNumbers() {
            try {
                const res = await fetch(`${API_URL}/get_numbers`);
                const data = await res.json();
                const display = document.getElementById('recent-numbers');
                display.textContent = data.recent_text || "Waiting...";
            } catch (e) {
                document.getElementById('recent-numbers').textContent = "Offline...";
            }
        }

        // Generate the 5x5 board
        const board = document.getElementById('board');
        const getNums = (min, max) => {
            let a = []; while(a.length < 5) {
                let r = Math.floor(Math.random()*(max-min+1))+min;
                if(!a.includes(r)) a.push(r);
            } return a;
        };
        const cols = [getNums(1,15), getNums(16,30), getNums(31,45), getNums(46,60), getNums(61,75)];
        
        for(let r=0; r<5; r++) {
            for(let c=0; c<5; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if(r===2 && c===2) { cell.textContent="FREE"; cell.classList.add('free','marked'); }
                else {
                    cell.textContent = cols[c][r];
                    cell.onclick = () => { cell.classList.toggle('marked'); tg.HapticFeedback.impactOccurred('medium'); };
                }
                board.appendChild(cell);
            }
        }

        async function claimBingo() {
            const marked = Array.from(document.querySelectorAll('.cell.marked')).map(el => el.textContent);
            tg.showConfirm("Submit Bingo Claim?", async (ok) => {
                if(!ok) return;
                try {
                    await fetch(`${API_URL}/claim_bingo`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            user: tg.initDataUnsafe.user?.username || "Player",
                            user_id: tg.initDataUnsafe.user?.id,
                            numbers: marked
                        })
                    });
                    tg.showAlert("Claim sent! Admin is checking.");
                } catch (e) { tg.showAlert("Error sending claim."); }
            });
        }

        setInterval(updateNumbers, 4000);
        updateNumbers();
    </script>
</body>
</html>
