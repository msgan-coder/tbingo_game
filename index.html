<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bingo Live</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 140px; margin: 0; }
        .header { position: fixed; top: 0; width: 100%; background: #16213e; padding: 10px 0; text-align: center; border-bottom: 4px solid #e94560; z-index: 1000; }
        
        /* Style for the Close/Minimize Button */
        .min-btn { position: absolute; left: 15px; top: 15px; background: rgba(233, 69, 96, 0.2); border: 1px solid #e94560; color: white; border-radius: 8px; padding: 6px 12px; font-weight: bold; font-size: 0.7rem; }
        
        .recent-container { display: flex; justify-content: center; gap: 10px; margin-top: 10px; height: 50px; }
        .num-ball { width: 45px; height: 45px; background: #0f3460; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; border: 2px solid #e94560; animation: pop 0.4s ease-out; }
        .num-ball.latest { background: #e94560; color: white; transform: scale(1.2); border-color: #fff; box-shadow: 0 0 15px #e94560; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 92%; max-width: 380px; margin-bottom: 5px; }
        .letter { text-align: center; font-size: 1.8rem; font-weight: 900; color: #e94560; text-shadow: 0 0 10px rgba(233, 69, 96, 0.5); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 92%; max-width: 380px; }
        .cell { aspect-ratio: 1; background: #0f3460; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; border: 2px solid #16213e; }
        .cell.marked { background: #27ae60; border-color: #fff; }
        .claim-btn { width: 85%; padding: 15px; border-radius: 50px; background: #e94560; color: white; font-size: 1.8rem; font-weight: bold; margin-top: 20px; margin-bottom: 15px; }
        
        /* Styled specifically for your dark theme layout */
        .rule-box { text-align: center; margin-top: 5px; margin-bottom: 35px; font-weight: bold; font-size: 1.2rem; color: #fff; background: #16213e; padding: 10px 25px; border-radius: 12px; border: 1px solid #e94560; }
        .rule-box span { color: #e94560; }
    </style>
</head>
<body>
    <div class="header">
        <button class="min-btn" onclick="tg.close()">CLOSE</button>
        
        <div id="status-bar">CONNECTING...</div>
        <div class="recent-container" id="recent-nums"></div>
    </div>

    <div class="bingo-header">
        <div class="letter">B</div><div class="letter">I</div><div class="letter">N</div><div class="letter">G</div><div class="letter">O</div>
    </div>

    <div class="grid" id="board"></div>
    <button id="bingo-btn" class="claim-btn" onclick="claim()">BINGO!</button>

    <!-- STEP 1: Rule Display placed perfectly at the bottom of your elements -->
    <div id="rule-display" class="rule-box">
        Rule: <span>Loading...</span>
    </div>
<div id="game-alert-box" class="rule-box" style="display: none; background: #e94560; border-color: #fff; margin-top: 10px;">
        <div id="alert-text-en" style="font-size: 1rem;"></div>
        <div id="alert-text-am" style="font-size: 1rem; margin-top: 5px;"></div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://uphold-islamist-retail.ngrok-free.dev"; 
        
        const params = new URLSearchParams(window.location.search);
        const mySession = params.get('s');
        const myUid = params.get('u');
        let knownNumbers = [];
        let gameOverAlerted = false; // Prevents the alert window from popping up infinitely

        async function update() {
            try {
                const res = await fetch(`${API_URL}/get_numbers`, { headers: {"ngrok-skip-browser-warning": "true"} });
                const data = await res.json();
                
                if (data.session_id.toString() !== mySession.toString()) {
                    document.getElementById('status-bar').innerText = "❌ SESSION EXPIRED";
                    document.getElementById('bingo-btn').disabled = true;
                    return;
                }
                
                document.getElementById('status-bar').innerText = data.active ? "● LIVE" : "⏳ WAITING";
                // --- BINGO CLAIM & WINNER LOGIC ---
                const alertBox = document.getElementById('game-alert-box');
                const alertEn = document.getElementById('alert-text-en');
                const alertAm = document.getElementById('alert-text-am');

                if (data.verifying) {
                    // Someone clicked Bingo, Admin is checking
                    alertBox.style.display = "block";
                    alertBox.style.background = "#f39c12"; // Orange for verifying
                    alertEn.innerHTML = `⚠️ <b>@${data.claimant}</b> sent claim bingo to verify!`;
                    alertAm.innerHTML = `⚠️ <b>@${data.claimant}</b> ቢንጎ ብለዋል ለማረጋገጥ እየተሞከረ ነው!`;
                } 
                else if (data.game_over && data.winner) {
                    // Admin confirmed the winner
                    alertBox.style.display = "block";
                    alertBox.style.background = "#27ae60"; // Green for winner
                    alertEn.innerHTML = `🏆 <b>GAME OVER! @${data.winner} win the game!</b>`;
                    alertAm.innerHTML = `🏆 <b>ጨዋታው ተጠናቋል! @${data.winner} አሸንፈዋል!</b>`;
                } 
                else if (!data.verifying && data.active && !data.paused) {
                    // Game is continuing (Reject happened or game is just running)
                    alertBox.style.display = "none"; 
                }
                // STEP 2: Update the bottom text with the active rule coming from backend
                if (data.win_mode) {
                    document.getElementById('rule-display').innerHTML = `Rule: <span>${data.win_mode}</span>`;
                }

                // STEP 3: Listen for Game Over status flag
                if (data.game_over === true) {
                    if (!gameOverAlerted) {
                        gameOverAlerted = true;
                        document.getElementById('bingo-btn').disabled = true;
                        document.getElementById('status-bar').innerText = "🏁 GAME OVER";
                        document.body.style.opacity = "0.5"; // Dims the screen visually
                        tg.showAlert("📢 GAME OVER!\nSomeone has won the game! Please wait for the next round.");
                    }
                } else {
                    gameOverAlerted = false;
                }

                const container = document.getElementById('recent-nums');
                if (JSON.stringify(data.recent) !== JSON.stringify(knownNumbers)) {
                    knownNumbers = data.recent;
                    container.innerHTML = "";
                    data.recent.forEach((n, i) => {
                        const ball = document.createElement('div');
                        ball.className = i === 0 ? "num-ball latest" : "num-ball";
                        ball.innerText = n;
                        container.appendChild(ball);
                    });
                }
            } catch (e) { document.getElementById('status-bar').innerText = "OFFLINE"; }
        }

        async function loadBoard() {
            try {
                const res = await fetch(`${API_URL}/get_card?user_id=${myUid}&s=${mySession}`, { headers: {"ngrok-skip-browser-warning": "true"} });
                const data = await res.json();
                const board = document.getElementById('board');
                board.innerHTML = "";
                for(let r=0; r<5; r++) {
                    for(let c=0; c<5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if(c===2 && r===2) { cell.innerText="FREE"; cell.classList.add('marked'); }
                        else {
                            cell.innerText = data.card[c][r];
                            cell.onclick = () => { cell.classList.toggle('marked'); tg.HapticFeedback.impactOccurred('light'); };
                        }
                        board.appendChild(cell);
                    }
                }
            } catch (e) { document.getElementById('status-bar').innerText = "CARD ERROR"; }
        }

        async function claim() {
            const btn = document.getElementById('bingo-btn');
            btn.disabled = true;
            btn.innerText = "VERIFYING...";
            const marked = Array.from(document.querySelectorAll('.cell.marked')).map(c => c.innerText);
            const userName = tg.initDataUnsafe.user?.username || tg.initDataUnsafe.user?.first_name || "Player";
            try {
                const res = await fetch(`${API_URL}/claim_bingo`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user: userName, user_id: myUid, numbers: marked })
                });
                const result = await res.json();
                tg.showAlert(result.status === "success" ? "🏆 BINGO Sent!" : "❌ " + result.message);
                if (result.status !== "success") { btn.disabled = false; btn.innerText = "BINGO!"; }
            } catch (e) { tg.showAlert("Connection Error"); btn.disabled = false; btn.innerText = "BINGO!"; }
        }

        loadBoard();
        setInterval(update, 2000);
        
        // Telegram WebApp specific settings
        tg.expand();
        tg.setHeaderColor('#16213e');
        tg.enableClosingConfirmation();
    </script>
</body>
</html>
