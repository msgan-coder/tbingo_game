<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .timer { font-size: 2rem; color: #f39c12; margin-bottom: 10px; font-weight: bold; }
        .recent-box { background: #16213e; padding: 15px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; border-bottom: 4px solid #0f3460; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; max-width: 350px; }
        .cell { aspect-ratio: 1; background: #0f3460; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .cell.marked { background: #e94560; transform: scale(0.9); box-shadow: 0 0 15px #e94560; }
        .cell.free { background: #27ae60; font-size: 0.7rem; }
        .claim-btn { margin-top: 30px; padding: 15px 40px; border-radius: 30px; border: none; background: #e94560; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="countdown" class="timer"></div>
    <div class="recent-box">
        <small>LATEST NUMBERS</small>
        <div id="numbers" style="font-size: 1.5rem; color: #e94560;">Waiting...</div>
    </div>
    <div class="grid" id="board"></div>
    <button class="claim-btn" onclick="claim()">BINGO!</button>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://uphold-islamist-retail.ngrok-free.dev"; // Updated every time you run LT

        async function update() {
            const res = await fetch(`${API_URL}/get_numbers`);
            const data = await res.json();
            
            if(data.timer > 0) {
                document.getElementById('countdown').innerText = `Starts in: ${data.timer}s`;
            } else {
                document.getElementById('countdown').innerText = data.active ? "LIVE" : "GAME OVER";
            }
            document.getElementById('numbers').innerText = data.recent.join("  ");
        }

        function createBoard() {
            const board = document.getElementById('board');
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if(i===12) { cell.innerText="FREE"; cell.classList.add('free','marked'); }
                else { 
                    cell.innerText = Math.floor(Math.random()*75)+1;
                    cell.onclick = () => { cell.classList.toggle('marked'); tg.HapticFeedback.impactOccurred('medium'); };
                }
                board.appendChild(cell);
            }
        }

        async function claim() {
            const marked = Array.from(document.querySelectorAll('.cell.marked')).map(c => c.innerText);
            const res = await fetch(`${API_URL}/claim_bingo`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user: tg.initDataUnsafe.user?.username,
                    user_id: tg.initDataUnsafe.user?.id,
                    numbers: marked
                })
            });
            const result = await res.json();
            tg.showAlert(result.status === "success" ? "Claim sent to Admin!" : result.message);
        }

        createBoard();
        setInterval(update, 2000);
    </script>
</body>
</html>
