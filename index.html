<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Corrected URL based on your bot username/render setup
    const BASE_URL = "https://t-bingo-bot.onrender.com"; 

    async function fetchLiveNumbers() {
        try {
            const response = await fetch(`${BASE_URL}/get_numbers`);
            const data = await response.json();
            if (data.recent) updateDisplay(data.recent);
        } catch (err) { console.error("Sync error..."); }
    }

    setInterval(fetchLiveNumbers, 4000);

    async function claimBingo() {
        const marked = Array.from(document.querySelectorAll('.cell.marked')).map(c => c.textContent);
        if(marked.length < 5) return tg.showAlert("Mark at least 5 numbers!");

        tg.showConfirm("Submit Bingo Claim?", async (ok) => {
            if(ok) {
                document.getElementById('waiting-overlay').style.display = 'flex';
                
                // Using fetch instead of tg.sendData for better reliability
                await fetch(`${BASE_URL}/claim_bingo`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: "claim_bingo",
                        user: tg.initDataUnsafe.user?.username || tg.initDataUnsafe.user?.first_name,
                        user_id: tg.initDataUnsafe.user?.id,
                        numbers: marked
                    })
                });
            }
        });
    }

    // ... (rest of your board generation code)
</script>
