<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #f1c40f; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        .recent-container { width: 95%; background: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        #recent-list { display: flex; justify-content: center; gap: 8px; margin-top: 5px; min-height: 40px; }
        .recent-num { width: 35px; height: 35px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; border: 1px solid #ccc; }
        .recent-num.latest { background: var(--accent); transform: scale(1.1); border-color: #d4ac0d; }
        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 95%; background: white; padding: 10px; border-radius: 10px; }
        .cell { aspect-ratio: 1; border: 1px solid #ddd; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; background: #fff; }
        .cell.marked { background: var(--accent); }
        .cell.free { background: #2ecc71; color: white; font-size: 10px; }
        .win-btn { width: 95%; padding: 15px; margin-top: 20px; background: #e74c3c; color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 1.2rem; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); color:white; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
    </style>
</head>
<body>
    <div id="overlay"><h2>VERIFYING...</h2><p>Wait for Admin.</p></div>
    <div class="recent-container">
        <strong>Recent Numbers</strong>
        <div id="recent-list"></div>
    </div>
    <div class="board" id="board"></div>
    <button class="win-btn" onclick="claimBingo()">BINGO! 🏆</button>

    <script>
        const tg = window.Telegram.WebApp;
        const BASE_URL = "https://tbingo-game-4.onrender.com";
        
        async function updateData() {
            try {
                const res = await fetch(`${BASE_URL}/get_numbers`);
                const data = await res.json();
                const list = document.getElementById('recent-list');
                list.innerHTML = '';
                if(data.recent) {
                    data.recent.forEach((num, i) => {
                        const div = document.createElement('div');
                        div.className = 'recent-num' + (i === 0 ? ' latest' : '');
                        div.textContent = num;
                        list.appendChild(div);
                    });
                }
            } catch (e) { console.log("Connecting..."); }
        }
        setInterval(updateData, 4000);

        function genBoard() {
            const board = document.getElementById('board');
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if(i === 12) { cell.textContent = "FREE"; cell.classList.add('free', 'marked'); }
                else {
                    cell.textContent = Math.floor(Math.random() * 75) + 1;
                    cell.onclick = () => { cell.classList.toggle('marked'); tg.HapticFeedback.impactOccurred('light'); };
                }
                board.appendChild(cell);
            }
        }
        genBoard();

        async function claimBingo() {
            const marked = Array.from(document.querySelectorAll('.cell.marked')).map(c => c.textContent);
            document.getElementById('overlay').style.display = 'flex';
            try {
                const res = await fetch(`${BASE_URL}/claim_bingo`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user: tg.initDataUnsafe.user?.username || "Player",
                        user_id: tg.initDataUnsafe.user?.id,
                        numbers: marked
                    })
                });
                if(!res.ok) throw new Error();
            } catch(e) {
                tg.showAlert("Claim Failed. Is the bot server running?");
                document.getElementById('overlay').style.display = 'none';
            }
        }
    </script>
</body>
</html>
