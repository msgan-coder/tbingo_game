<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telebirr Bingo Online</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #f1c40f; /* Yellow for highlights */
            --success: #2ecc71;
            --danger: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--primary); margin-bottom: 5px; }
        
        /* New Call Highlight Section */
        .call-display {
            background: var(--accent);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid var(--primary);
        }

        .info { font-size: 0.85rem; color: #666; margin-bottom: 15px; text-align: center; }
        
        /* Bingo Grid */
        .bingo-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .cell {
            aspect-ratio: 1;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .cell:active { transform: scale(0.9); }
        .cell.marked {
            background-color: var(--accent); /* Yellow when selected */
            border-color: var(--primary);
            color: var(--primary);
        }
        .cell.free {
            background-color: var(--success);
            color: white;
            font-size: 0.7rem;
        }

        /* Controls */
        .controls { margin-top: 25px; width: 100%; max-width: 400px; }
        .win-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background-color: var(--danger);
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 0 #c0392b;
            cursor: pointer;
        }
        .win-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <h1>BINGO</h1>
    
    <!-- Latest Number Display -->
    <div class="call-display" id="latest-display">
        LATEST CALL: <span id="current-num">WAITING...</span>
    </div>

    <p class="info">Watch the Channel! Tap the number here when it turns YELLOW in the board.</p>

    <div class="bingo-board" id="board">
        <!-- Grid generated by JS -->
    </div>

    <div class="controls">
        <button class="win-btn" onclick="claimBingo()">BINGO! 🏆</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const boardElement = document.getElementById('board');
        const currentNumDisplay = document.getElementById('current-num');

        // Helper to get random numbers for columns
        function getRandom(min, max, count) {
            let arr = [];
            while(arr.length < count) {
                let r = Math.floor(Math.random() * (max - min + 1)) + min;
                if(arr.indexOf(r) === -1) arr.push(r);
            }
            return arr;
        }

        // Generate the card data
        function createCard() {
            const columns = {
                'B': getRandom(1, 15, 5),
                'I': getRandom(16, 30, 5),
                'N': getRandom(31, 45, 5),
                'G': getRandom(46, 60, 5),
                'O': getRandom(61, 75, 5)
            };

            const flatCard = [];
            for (let row = 0; row < 5; row++) {
                flatCard.push(columns['B'][row]);
                flatCard.push(columns['I'][row]);
                flatCard.push(columns['N'][row]);
                flatCard.push(columns['G'][row]);
                flatCard.push(columns['O'][row]);
            }
            return flatCard;
        }

        // Render the card
        const cardData = createCard();
        cardData.forEach((num, index) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            
            if (index === 12) {
                cell.textContent = "FREE";
                cell.classList.add('free', 'marked');
            } else {
                cell.textContent = num;
                cell.onclick = () => {
                    cell.classList.toggle('marked');
                    // When user taps, update the "Latest Call" display for their own reference
                    if(cell.classList.contains('marked')) {
                        currentNumDisplay.textContent = num;
                    }
                };
            }
            boardElement.appendChild(cell);
        });

        // BINGO CLAIM LOGIC
        function claimBingo() {
            const markedCells = document.querySelectorAll('.cell.marked');
            const numbers = Array.from(markedCells).map(c => c.textContent);
            
            if(numbers.length < 5) {
                tg.showAlert("You must mark at least 5 numbers (1 line) to claim BINGO!");
                return;
            }

            const username = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.username : "Anonymous";

            // Sending Data to Python Bot
            tg.sendData(JSON.stringify({
                action: "claim_bingo",
                user: username,
                numbers: numbers
            }));
            
            tg.close(); 
        }
    </script>
</body>
</html>
