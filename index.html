<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 120px; margin: 0; }
        
        .header { position: fixed; top: 0; width: 100%; background: #16213e; padding: 15px 0; text-align: center; border-bottom: 4px solid #e94560; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .recent-label { font-size: 0.8rem; color: #f39c12; text-transform: uppercase; margin-bottom: 5px; }
        .numbers-display { font-size: 2rem; color: #e94560; font-weight: 900; letter-spacing: 3px; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 95%; max-width: 360px; padding: 10px; }
        .cell { aspect-ratio: 1; background: #0f3460; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: bold; border: 2px solid #16213e; transition: 0.2s; }
        .cell.marked { background: #e94560; transform: scale(0.95); box-shadow: 0 0 15px rgba(233, 69, 96, 0.6); }
        .cell.free { background: #27ae60; font-size: 0.7rem; }
        
        .claim-btn { margin-top: 25px; padding: 18px 80px; border-radius: 50px; border: none; background: #e94560; color: white; font-size: 1.8rem; font-weight: bold; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 rgba(233, 69, 96, 0); } 50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="recent-label">Latest Numbers / አሁን የወጡ ቁጥሮች</div>
        <div id="numbers" class="numbers-display">READY</div>
        <div id="status" style="font-size: 0.9rem; color: #27ae60; margin-top: 5px;"></div>
    </div>

    <div class="grid" id="board"></div>
    <button class="claim-btn" onclick="claim()">BINGO!</button>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://uphold-islamist-retail.ngrok-free.dev"; 

        async function update() {
            try {
                const res = await fetch(`${API_URL}/get_numbers`, { headers: {"ngrok-skip-browser-warning": "true"} });
                const data = await res.json();
                document.getElementById('numbers').innerText = data.recent.length > 0 ? data.recent.join(" ") : "WAITING";
                document.getElementById('status').innerText = data.active ? "● LIVE" : "GAME OVER";
            } catch (e) { document.getElementById('numbers').innerText = "OFFLINE"; }
        }

        // Each player gets a completely unique card every time they open the app
        function createUniqueBoard() {
            const board = document.getElementById('board');
            const cols = {
                B: shuffle(Array.from({length: 15}, (_, i) => i + 1)).slice(0, 5),
                I: shuffle(Array.from({length: 15}, (_, i) => i + 16)).slice(0, 5),
                N: shuffle(Array.from({length: 15}, (_, i) => i + 31)).slice(0, 5),
                G: shuffle(Array.from({length: 15}, (_, i) => i + 46)).slice(0, 5),
                O: shuffle(Array.from({length: 15}, (_, i) => i + 61)).slice(0, 5)
            };

            for(let r=0; r<5; r++) {
                ['B','I','N','G','O'].forEach(l => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if(l === 'N' && r === 2) {
                        cell.innerText = "FREE";
                        cell.classList.add('free', 'marked');
                    } else {
                        cell.innerText = cols[l][r];
                        cell.onclick = () => { cell.classList.toggle('marked'); tg.HapticFeedback.impactOccurred('medium'); };
                    }
                    board.appendChild(cell);
                });
            }
        }

        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

        async function claim() {
            const marked = Array.from(document.querySelectorAll('.cell.marked')).map(c => c.innerText);
            const res = await fetch(`${API_URL}/claim_bingo`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: tg.initDataUnsafe.user?.username, user_id: tg.initDataUnsafe.user?.id, numbers: marked })
            });
            const result = await res.json();
            tg.showAlert(result.status === "success" ? "Claim sent to Admin!" : result.message);
        }

        createUniqueBoard();
        setInterval(update, 2000);
        tg.expand();
    </script>
</body>
</html>
